          <p class="text-justify leading-relaxed">The rapid effect of ketamine does not mean that it is a simple cure. A single infusion often produces improvement that is strongest during the first day or first week, then may fade without repeated treatment or maintenance strategies.${refs(5)} This pattern distinguishes ketamine from traditional antidepressants in two ways. First, the onset is unusually fast. Second, the durability of a single treatment is often limited. As a result, ketamine research focuses not only on acute response but also on relapse prevention, repeated dosing protocols, psychotherapy integration, and long-term safety.</p>

          <h3 class="text-2xl font-serif font-bold mt-8 mb-4 text-neuro-900">3.1 Prefrontal Cortex and Limbic Regions</h3>
          <p class="text-justify leading-relaxed">A useful way to understand depression is through an imbalance between top-down control and bottom-up emotional reactivity. Prefrontal regions normally help regulate limbic responses by evaluating context, inhibiting excessive threat responses, and guiding flexible behavior. Limbic regions such as the amygdala and hippocampus detect emotional salience and store associations between experiences and affective meaning. In depression, prefrontal regulation may weaken while limbic responses to negative stimuli become exaggerated or persistent.${refs(9)}</p>

        introText: 'Ketamine has changed depression research, but unresolved questions remain about durability, safety, mechanism, subjective effects, and biomarkers.',
        content: `
          <p class="mb-6 text-justify leading-relaxed">The evidence supporting ketamine’s rapid antidepressant effect is strong enough to have changed depression research, but several questions remain unresolved. First, durability is a major issue. Many patients improve quickly after ketamine, but relapse can occur after days or weeks unless treatment is repeated or combined with other strategies.${refs(5)} This raises practical questions about maintenance dosing, long-term safety, cost, and how to integrate ketamine with psychotherapy or conventional antidepressants.</p>

          <div class="space-y-4 mb-8">
            ${accordion('acc1', 'Duration of efficacy', 'A single intravenous infusion typically produces rapid improvement within 24 hours, but the effect often fades within 7 to 14 days. To maintain the response, clinical protocols often involve an acute phase of repeated infusions (e.g., twice weekly for four weeks) followed by a tapering maintenance phase. However, the optimal long-term maintenance strategy—whether it involves spacing out ketamine treatments, transitioning to oral medications, or integrating targeted psychotherapy—remains a subject of intense ongoing research.')}
            
            ${accordion('acc2', 'Safety and monitoring', 'Ketamine administration requires careful clinical oversight. Acute side effects frequently include dissociation, sedation, transient blood pressure elevation, and nausea. Because of these risks, regulatory approvals like the FDA’s ruling on esketamine mandate a Risk Evaluation and Mitigation Strategy (REMS). Patients must be monitored in a certified healthcare setting for at least two hours post-administration. There are also long-term concerns regarding abuse liability and potential bladder toxicity (ulcerative cystitis) with chronic, unmonitored use.')}
            
            ${accordion('acc3', 'Subjective experience (The "Trip")', 'Does a patient need to experience dissociation to get better? Some clinical studies suggest a positive correlation between the intensity of the dissociative experience and the degree of antidepressant response, hinting that the altered state of consciousness might be therapeutically relevant, perhaps akin to psychedelic-assisted therapy. Conversely, other researchers argue that the neuroplastic effects can occur independently of the subjective "trip," viewing dissociation merely as an off-target side effect of NMDAR antagonism.')}
            
            ${accordion('acc4', 'Biomarkers for treatment response', 'Given that ketamine does not work for everyone (response rates hover around 50-70% in TRD), finding predictive biomarkers is a major clinical priority. Researchers are investigating baseline resting-state fMRI connectivity, EEG signatures (such as theta or gamma band power), peripheral inflammation markers, and blood levels of BDNF. While promising patterns are emerging, no single biomarker is currently robust or accessible enough to be used for routine patient selection.')}
            
            ${accordion('acc5', 'Mechanism debates: Beyond Glutamate', 'While the glutamate-burst and synaptic plasticity model is the most dominant, competing theories exist. For instance, some research highlights the role of ketamine metabolites, like hydroxynorketamine (HNK), which may produce antidepressant effects without blocking NMDA receptors. Additionally, controversial human studies have shown that pre-treatment with naltrexone (an opioid antagonist) can block ketamine’s antidepressant effects, suggesting that endogenous opioid system activation may be a crucial, previously overlooked component of its mechanism.')}
          </div>

          <p class="text-justify leading-relaxed">Safety and regulation remain central concerns. Ketamine can cause dissociation, sedation, elevated blood pressure, nausea, perceptual changes, and potential misuse. Esketamine is administered under a Risk Evaluation and Mitigation Strategy program in certified clinical settings, reflecting concerns about sedation, dissociation, and abuse potential.${refs(4)} Off-label or compounded ketamine raises additional concerns because dosing, monitoring, and product quality may vary.</p>

          <p class="mt-4 text-justify leading-relaxed">Finally, ketamine raises broader questions about how depression should be understood. Its rapid effects challenge the older idea that antidepressant response must depend mainly on slow monoamine changes. Instead, ketamine supports a model in which depression involves impaired plasticity and maladaptive circuit dynamics. By rapidly influencing glutamate signaling, synaptic strength, and network connectivity, ketamine may temporarily restore flexibility to systems that have become rigid under chronic stress and depression. The most balanced conclusion is that ketamine is neither a miracle cure nor merely a short-term anesthetic repurposed for mood. It is a powerful research tool and a clinically important treatment that has reframed depression as a disorder of circuits, synapses, and plasticity.</p>
        `
      },

    const timelineData = {
      '1962': ['1962: Ketamine synthesis', 'Calvin Stevens synthesized ketamine as CI-581 while searching for a safer anesthetic alternative to PCP.'],
      '1970': ['1970: FDA approval', 'Ketamine was approved for anesthetic use and became valuable in emergency and military contexts because it preserved airway reflexes and cardiovascular stability.'],
      '2000': ['2000: Rapid antidepressant signal', 'Berman and colleagues published one of the first controlled reports showing rapid antidepressant effects after subanesthetic ketamine.'],
      '2006': ['2006: TRD replication', 'Zarate and colleagues replicated rapid antidepressant effects in treatment-resistant depression, strengthening the clinical importance of the finding.'],
      '2019': ['2019: Esketamine approval', 'Intranasal esketamine was approved for treatment-resistant depression with required clinical monitoring.']
    };

    function timelineItem(year, title, text, reverse) {
      return `
        <div class="mb-8 flex justify-between ${reverse ? 'flex-row-reverse' : ''} items-center w-full">
          <div class="order-1 w-5/12"></div>
          <button class="z-20 flex items-center order-1 bg-neuro-500 shadow-xl w-14 h-14 rounded-full justify-center text-white font-bold cursor-pointer transition transform hover:scale-110 hover:bg-neuro-700" onclick="showTimelineDetail('${year}')">${year}</button>
          <div class="order-1 bg-white rounded-2xl shadow-sm border border-warm-100 w-5/12 px-5 py-4">
            <h3 class="mb-1 font-bold text-neuro-900 text-lg">${title}</h3>
            <p class="text-sm leading-snug text-gray-700">${text}</p>
          </div>
        </div>`;
    }

    function regionCard(id, icon, title, summary, detail) {
      return `
        <div class="brain-region-card bg-white p-5 rounded-3xl shadow-sm border border-gray-100" onclick="toggleCircuitDetail('${id}')">
          <div class="text-4xl mb-3">${icon}</div>
          <h3 class="font-bold text-lg text-neuro-900">${title}</h3>
          <p class="text-sm text-gray-600 mt-2">${summary}</p>
          <div id="detail-${id}" class="hidden mt-4 pt-4 border-t border-gray-200 text-sm leading-relaxed">${detail}</div>
        </div>`;
    }

    function accordion(id, title, content) {
      return `
        <div class="border border-gray-200 rounded-2xl bg-white overflow-hidden shadow-sm">
          <button class="w-full text-left px-6 py-4 font-bold text-neuro-900 bg-gray-50 hover:bg-gray-100 focus:outline-none flex justify-between items-center" onclick="toggleAccordion('${id}')">
            <span>${title}</span><span id="icon-${id}" class="text-xl">+</span>
          </button>
          <div id="content-${id}" class="px-6 py-4 hidden text-sm text-gray-700 text-justify leading-relaxed">${content}</div>
        </div>`;
    }

    let currentChart1 = null;
    let currentChart2 = null;

    function navigate(sectionId) {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('bg-neuro-700');
        if (link.getAttribute('data-target') === sectionId) link.classList.add('bg-neuro-700');
      });

      document.getElementById('sidebar').classList.add('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.add('hidden');

      const data = wikiData[sectionId];
      const container = document.getElementById('main-content');

      container.innerHTML = `
        <div class="view-content">
          <div class="mb-8">
            <p class="text-xs uppercase tracking-[0.2em] text-neuro-500 font-bold mb-3">Interactive Wiki</p>
            <h2 class="text-3xl md:text-5xl font-serif font-bold text-neuro-900 mb-3 leading-tight">${data.title}</h2>
            ${data.subtitle ? `<h3 class="text-xl text-neuro-700 mb-5">${data.subtitle}</h3>` : ''}
            <p class="text-lg text-gray-500 italic border-b border-gray-200 pb-5">${data.introText}</p>
          </div>
          <div class="text-gray-800 leading-relaxed">${data.content}</div>
        </div>`;

      if (sectionId === 'rapid') initRapidActionChart();
      if (sectionId === 'plasticity') initPlasticityChart();
      document.querySelector('main').scrollTo(0, 0);
    }

    function showTimelineDetail(year) {
      const box = document.getElementById('timeline-detail-box');
      const [title, body] = timelineData[year];
      box.innerHTML = `<h4 class="text-xl font-bold mb-2 text-neuro-900">${title}</h4><p class="text-gray-700 text-justify leading-relaxed">${body}</p>`;
      box.classList.remove('hidden');
      box.classList.add('view-content');
    }

    function toggleCircuitDetail(region) {
      const detail = document.getElementById(`detail-${region}`);
      const card = detail.parentElement;
      const isHidden = detail.classList.contains('hidden');

      document.querySelectorAll('[id^="detail-"]').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.brain-region-card').forEach(el => el.classList.remove('brain-region-active'));

      if (isHidden) {
        detail.classList.remove('hidden');
        card.classList.add('brain-region-active');
      }
    }

    function toggleAccordion(id) {
      const content = document.getElementById(`content-${id}`);
      const icon = document.getElementById(`icon-${id}`);
      const hidden = content.classList.contains('hidden');
      content.classList.toggle('hidden');
      icon.textContent = hidden ? '−' : '+';
    }

    function initRapidActionChart() {
      const ctx = document.getElementById('rapidActionChart').getContext('2d');
      if (currentChart1) currentChart1.destroy();
      currentChart1 = new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Baseline', '2 Hours', '24 Hours', 'Day 3', 'Day 7', 'Week 2', 'Week 4', 'Week 8'],
          datasets: [
            { label: 'Ketamine', data: [35, 22, 15, 16, 18, 22, 27, 30], borderColor: '#4a7c73', backgroundColor: 'rgba(74,124,115,0.18)', borderWidth: 3, tension: 0.4, pointRadius: 5, fill: true },
            { label: 'Standard SSRI', data: [35, 35, 34, 33, 31, 28, 22, 17], borderColor: '#94a3b8', backgroundColor: 'transparent', borderWidth: 2, borderDash: [6, 5], tension: 0.4, pointRadius: 4 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: {
            y: { title: { display: true, text: 'Depression Severity Score' }, min: 0, max: 40 },
            x: { title: { display: true, text: 'Time After Treatment Starts' } }
          }
        }
      });
    }

    function initPlasticityChart() {
      const ctx = document.getElementById('plasticityChart').getContext('2d');
      if (currentChart2) currentChart2.destroy();
      currentChart2 = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Dendritic Spine Density', 'BDNF Signaling', 'PSD-95 Expression'],
          datasets: [
            { label: 'Healthy Control', data: [100, 100, 100], backgroundColor: '#e2e8f0' },
            { label: 'TRD / Chronic Stress', data: [60, 55, 65], backgroundColor: '#94a3b8' },
            { label: 'Post-Ketamine', data: [95, 120, 105], backgroundColor: '#4a7c73' }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: { y: { title: { display: true, text: 'Relative Level (% of Control)' }, min: 0, max: 140 } }
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('mobile-menu-btn');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      function toggleMenu() {
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
      }
      btn.addEventListener('click', toggleMenu);
      overlay.addEventListener('click', toggleMenu);
      navigate('intro');
    });
  </script>
</body>
</html>
